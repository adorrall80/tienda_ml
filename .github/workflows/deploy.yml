name: Deploy FTP

# Reglas de publicacion:
# - Si haces push a master, se publica en la raiz del FTP: ./
# - Si haces push a cualquier otra rama, se publica en pruebas: ./pruebas/
# - No necesitas modificar este YAML por cada feature/hotfix nuevo.
# - Si varias ramas publican en pruebas, la ultima rama que haga push reemplaza lo anterior.

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tienda

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, ctype, fileinfo, json, openssl, pdo, tokenizer, xml

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PHP dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --optimize-autoloader

      - name: Install Node dependencies
        if: hashFiles('tienda/package.json') != ''
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build assets
        if: hashFiles('tienda/package.json') != ''
        run: npm run build

      - name: Prepare Laravel cache
        run: |
          php artisan config:clear
          php artisan route:clear
          php artisan view:clear

      # Produccion: solo cuando haces push a master.
      - name: Deploy production root
        if: github.ref == 'refs/heads/master'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          timeout: 60000
          log-level: verbose
          dangerous-clean-slate: false
          local-dir: ./tienda/
          server-dir: ./public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            **/tests/**
            **/.env
            **/storage/logs/**
            **/storage/framework/**
            **/database/database.sqlite

      # Pruebas: cualquier rama distinta de master.
      - name: Deploy testing folder
        if: github.ref != 'refs/heads/master'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          timeout: 60000
          log-level: verbose
          dangerous-clean-slate: false
          local-dir: ./tienda/
          server-dir: /tienda_mv_test/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            **/tests/**
            **/.env
            **/storage/logs/**
            **/storage/framework/**
            **/database/database.sqlite